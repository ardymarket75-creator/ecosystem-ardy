<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso - Hardyglot</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>
<body>
    <h2>Accede al Laboratorio</h2>
    
    <button id="btn-google" onclick="iniciarConGoogle()" style="padding: 10px; background-color: #4285f4; color: white; border: none; cursor: pointer;">
        Acceder con Google
    </button>

    <hr>

    <p>O ingresa con tu correo:</p>
    <input type="email" id="email" placeholder="Tu correo electrónico">
    <button onclick="iniciarSesion()">Enviar enlace mágico</button>

    <script>
        // Función para Google
        async function iniciarConGoogle() {
            const { data, error } = await window.supabase.auth.signInWithOAuth({
                provider: 'google',
            });
            if (error) alert("Error al entrar con Google: " + error.message);
        }

        // Tu función anterior de Magic Link
        async function iniciarSesion() {
            const email = document.getElementById('email').value;
            const { data, error } = await window.supabase.auth.signInWithOtp({
                email: email,
                options: { emailRedirectTo: window.location.origin }
            });
            if (error) alert("Error: " + error.message);
            else alert("¡Revisa tu correo!");
        }
    </script>
</body>
</html>
