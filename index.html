<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Hardyglot - Tu camino a la fluidez</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f2f5;
            margin: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            position: relative;
            width: 90%;
            max-width: 400px;
        }

        .btn-close {
            position: absolute;
            top: 10px;
            right: 15px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            color: #999;
        }

        .btn-google {
            padding: 12px 24px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }

        input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin: 10px 0;
            width: 80%;
        }

        .btn-magic {
            padding: 10px 20px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>Bienvenido a Hardyglot</h1>
        <p>Habla Idiomas de Manera Natural y Acelerada</p>

        <button class="btn-google" onclick="iniciarConGoogle()">Acceder con Google</button>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

        <p>O ingresa con tu correo:</p>
        <input type="email" id="email" placeholder="Tu correo electrónico">
        <br>
        <button class="btn-magic" onclick="iniciarSesion()">Enviar enlace mágico</button>
    </div>

    <script>
        async function iniciarConGoogle() {
            const { data, error } = await window.supabase.auth.signInWithOAuth({
                provider: 'google',
            });
            if (error) alert("Error al entrar con Google: " + error.message);
        }

        async function iniciarSesion() {
            const email = document.getElementById('email').value;
            const { data, error } = await window.supabase.auth.signInWithOtp({
                email: email,
                options: { emailRedirectTo: window.location.origin }
            });
            if (error) alert("Error: " + error.message);
            else alert("¡Revisa tu correo!");
        }
        window.supabase.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN') {
        // Redirigimos a la página de bienvenida
        window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>

</html>
