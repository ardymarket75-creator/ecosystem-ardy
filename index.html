<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hardyglot - Tu camino a la fluidez</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1b7a63 0%, #6c5ce7 100%);
            margin: 0;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h1 { color: #1b7a63; margin-bottom: 10px; }
        p { color: #666; }
        .btn-google {
            padding: 12px 24px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-google:hover {
            background: #3367d6;
            transform: translateY(-2px);
        }
        input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin: 10px 0;
            width: 100%;
            max-width: 250px;
            font-family: 'Poppins', sans-serif;
        }
        input:focus {
            outline: none;
            border-color: #1b7a63;
            box-shadow: 0 0 0 3px rgba(27, 122, 99, 0.1);
        }
        .btn-magic {
            padding: 10px 20px;
            background: #1b7a63;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }
        .btn-magic:hover {
            background: #146351;
        }
        .loading {
            color: #1b7a63;
            font-weight: 600;
            display: none;
        }
    </style>
</head>
<body>
    <div class="box" id="loginBox">
        <h1>Hardyglot</h1>
        <p>Tu camino a la fluidez</p>

        <button class="btn-google" onclick="iniciarConGoogle()">🔵 Acceder con Google</button>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

        <p>O ingresa con tu correo:</p>
        <input type="email" id="email" placeholder="tu@email.com">
        <br>
        <button class="btn-magic" onclick="iniciarSesion()">Enviar enlace mágico</button>

        <div class="loading" id="loading">Procesando...</div>
    </div>

    <script>
        async function iniciarConGoogle() {
            document.getElementById('loading').style.display = 'block';
            const { data, error } = await window.supabase.auth.signInWithOAuth({
                provider: 'google',
            });
            if (error) {
                alert("Error: " + error.message);
                document.getElementById('loading').style.display = 'none';
            }
        }

        async function iniciarSesion() {
            const email = document.getElementById('email').value;
            if (!email) {
                alert("Por favor ingresa tu correo");
                return;
            }
            document.getElementById('loading').style.display = 'block';
            const { data, error } = await window.supabase.auth.signInWithOtp({
                email: email,
                options: { emailRedirectTo: window.location.origin }
            });
            if (error) {
                alert("Error: " + error.message);
                document.getElementById('loading').style.display = 'none';
            } else {
                alert("¡Revisa tu correo!");
                document.getElementById('email').value = '';
                document.getElementById('loading').style.display = 'none';
            }
        }

        // Escuchar cambios de sesión
        window.supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION') {
                if (session) {
                    window.location.href = 'language-lab.html';
                }
            }
        });

        // Verificar si ya está logueado
        window.addEventListener('load', async () => {
            const { data: { session } } = await window.supabase.auth.getSession();
            if (session) {
                window.location.href = 'language-lab.html';
            }
        });

        // Enter para enviar magic link
        document.getElementById('email').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') iniciarSesion();
        });
    </script>
</body>
</html>
