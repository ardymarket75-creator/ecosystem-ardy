<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecosistema de Idiomas</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f4f4f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 500px; 
            padding: 30px; 
            text-align: center; 
        }
        .contador { font-size: 14px; color: #999; margin-bottom: 20px; }
        
        /* Cajas con altura mínima fija para que nada salte */
        .target-lang { min-height: 130px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .target-en { font-size: 26px; font-weight: bold; color: #2c3e50; margin-bottom: 15px; }
        
        .btn-audio { 
            background: #27ae60; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-audio:hover { background: #2ecc71; }

        .divider { height: 1px; background: #e0e0e0; margin: 20px 0; }
        
        /* Botones de navegación anclados debajo del divisor */
        .nav-buttons { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .btn-nav { background: #2980b9; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 45%; }
        .btn-nav:disabled { background: #bdc3c7; cursor: not-allowed; }

        .support-lang { min-height: 140px; display: flex; flex-direction: column; justify-content: center; }
        .lang-es { font-size: 18px; color: #555; margin-bottom: 15px; }
        .lang-he { font-size: 24px; color: #8e44ad; margin-bottom: 5px; direction: rtl; }
        .lang-he-trans { font-size: 16px; color: #7f8c8d; font-style: italic; }
    </style>
</head>
<body>
    <div class="card">
        <div class="contador" id="contador">Cargando...</div>

        <div class="target-lang">
            <div class="target-en" id="texto-en">...</div>
            <button class="btn-audio" onclick="reproducirAudio()">
                ▶ Reproducir
            </button>
        </div>

        <div class="divider"></div>

        <div class="nav-buttons">
            <button class="btn-nav" id="btn-ant" onclick="cambiarFrase(-1)">Anterior</button>
            <button class="btn-nav" id="btn-sig" onclick="cambiarFrase(1)">Siguiente</button>
        </div>

        <div class="support-lang">
            <div class="lang-es" id="texto-es"></div>
            <div class="lang-he" id="texto-he"></div>
            <div class="lang-he-trans" id="texto-trans"></div>
        </div>
    </div>

    <script>
        let frases = [];
        let indiceActual = 0;

        fetch('frases.json')
            .then(response => response.json())
            .then(data => {
                frases = data;
                mostrarFrase(indiceActual);
            })
            .catch(error => {
                document.getElementById('texto-en').innerText = "Error conectando a la base de datos.";
            });

        function mostrarFrase(indice) {
            if(frases.length === 0) return;
            const frase = frases[indice];

            document.getElementById('texto-en').innerText = frase.idioma_objetivo.frase_completa;
            document.getElementById('texto-es').innerText = frase.idiomas_soporte[0].frase_traduccion;
            document.getElementById('texto-he').innerText = frase.idiomas_soporte[1].frase_traduccion;
            document.getElementById('texto-trans').innerText = frase.idiomas_soporte[1].transliteracion;
            document.getElementById('contador').innerText = `Frase ${indice + 1} de ${frases.length}`;

            document.getElementById('btn-ant').disabled = (indice === 0);
            document.getElementById('btn-sig').disabled = (indice === frases.length - 1);
        }

        function cambiarFrase(direccion) {
            indiceActual += direccion;
            if (indiceActual < 0) indiceActual = 0;
            if (indiceActual >= frases.length) indiceActual = frases.length - 1;
            mostrarFrase(indiceActual);
        }

        function reproducirAudio() {
            alert("El motor de audio se conectará aquí en el siguiente paso.");
        }
    </script>
</body>
</html>
