    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --color-1: #1b7a63;        /* Primary - Verde */
            --color-2: #e74c3c;        /* Accent - Coral */
            --color-3: #6c5ce7;        /* Hebrew - Púrpura */
            --color-4: #2196f3;        /* Secondary - Azul */
            --color-5: #f39c12;        /* Highlight - Naranja */
            --color-primary: #1b7a63;
            --color-hebrew: #6c5ce7;
            --color-bg: #f8f9fa;
            --color-text: #1a1a1a;
            --color-text-light: #666;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            padding: 0;
            margin: 0;
        }

        /* TOP BAR */
        .top-bar {
            background: var(--color-primary);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            direction: rtl;
        }

        .top-bar h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        .btn-nav {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-nav:hover {
            background: rgba(255,255,255,0.3);
        }

        /* CONTENT */
        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .section h2 {
            color: var(--color-hebrew);
            margin-bottom: 20px;
            font-size: 20px;
            direction: rtl;
        }

        .paragraph-wrap {
            direction: rtl;
            text-align: right;
            font-family: 'Frank Ruhl Libre', serif;
            font-size: 28px;
            line-height: 2;
            color: var(--color-text);
        }

        .phrase {
            cursor: pointer;
            border-radius: 6px;
            padding: 8px 12px;
            display: block;
            width: fit-content;
            margin: 12px 0 12px auto;
            transition: all 0.2s;
            user-select: none;
            background: rgba(27, 122, 99, 0.05);
        }

        .phrase:hover {
            background: rgba(27, 122, 99, 0.15);
            font-weight: 600;
        }

        .phrase.playing {
            background: var(--color-primary);
            color: white;
            font-weight: 700;
        }

        .hint {
            font-size: 14px;
            color: var(--color-text-light);
            margin-bottom: 20px;
            text-align: center;
            font-style: italic;
        }

        .status {
            font-size: 12px;
            color: var(--color-accent);
            margin-top: 15px;
            min-height: 18px;
            direction: ltr;
            text-align: center;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 20px;
            color: var(--color-text-light);
            font-size: 12px;
        }

        /* LOADING */
        .loading-msg {
            text-align: center;
            padding: 40px;
            color: var(--color-text-light);
        }
    </style>

        // ==================
        // RENDER & AUDIO LOGIC
        // ==================
        let currentAudio = null;
        let currentSpan = null;

        function renderTefilot() {
            const container = document.getElementById('shacharit');
            tefilot.forEach((item, idx) => {
                const span = document.createElement('span');
                span.className = 'phrase';
                span.textContent = item.text;
                span.setAttribute('data-src', item.src);
                span.setAttribute('data-idx', idx);
                span.addEventListener('click', playAudio);
                container.appendChild(span);
            });
        }

        function playAudio(e) {
            const span = e.target;
            const src = span.getAttribute('data-src');

            // Stop different phrase
            if (currentSpan && currentSpan !== span) {
                currentSpan.classList.remove('playing');
                if (currentAudio) currentAudio.pause();
                currentAudio = null;
                currentSpan = null;
            }

            // Toggle same phrase
            if (currentAudio && !currentAudio.paused) {
                currentAudio.pause();
                span.classList.remove('playing');
                document.getElementById('status-shacharit').textContent = '';
                return;
            }

            if (currentAudio && currentAudio.paused) {
                currentAudio.play().catch(() => {
                    document.getElementById('status-shacharit').textContent = 'Tap again to play.';
                });
                span.classList.add('playing');
                currentSpan = span;
                return;
            }

            // Play new audio
            currentAudio = new Audio(src);
            currentAudio.onended = () => {
                span.classList.remove('playing');
                document.getElementById('status-shacharit').textContent = '';
            };
            currentAudio.onerror = () => {
                span.classList.remove('playing');
                document.getElementById('status-shacharit').textContent = '❌ Could not load audio.';
            };
            currentAudio.play().catch(() => {
                document.getElementById('status-shacharit').textContent = 'Tap again to play.';
            });
            span.classList.add('playing');
            currentSpan = span;
        }

        // Load on page load
        window.addEventListener('load', renderTefilot);
    </script>

</body>
</html>
