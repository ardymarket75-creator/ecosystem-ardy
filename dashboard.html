<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Hub - ArdyMarket</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Urbanist', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 60px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 800px; width: 90%; }
        h1 { font-size: 36px; margin-bottom: 40px; color: #1f2937; }
        h1 span { color: #10B981; display: block; font-size: 28px; margin-top: 5px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .card { border: 2px solid #E5E7EB; border-radius: 15px; padding: 30px; text-decoration: none; color: #374151; transition: 0.3s; display: block; }
        .card:hover { border-color: #10B981; background: #f9fafb; transform: translateY(-5px); }
        .card i { font-size: 40px; color: #3B82F6; margin-bottom: 20px; }
        .card h2 { margin: 0 0 5px 0; font-size: 20px; color: #1f2937; }
        .card p { margin: 0; font-size: 14px; color: #6b7280; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ArdyMarket <span>Learning Hub</span></h1>
        <div class="grid">
            <a href="#" class="card">
                <i class="fa-solid fa-brain"></i>
                <h2>Hardyglot</h2>
                <p>Mentoría personalizada</p>
            </a>
            <a href="language-lab.html" class="card">
                <i class="fa-solid fa-language"></i>
                <h2>Language Lab</h2>
                <p>Metodología acelerada</p>
            </a>
            <a href="#" class="card">
                <i class="fa-solid fa-graduation-cap"></i>
                <h2>Ardy Academy</h2>
                <p>Escuela integral</p>
            </a>
            <a href="https://sites.google.com/view/erikjcarvajal/jazanut" class="card">
                <i class="fa-solid fa-book-tanakh"></i>
                <h2>Bet Kneset</h2>
                <p>Estudios y Liturgia</p>
            </a>
        </div>
    </div>
</body>
</html>
