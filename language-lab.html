<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Language Lab - Sistema de Estrellas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --teal: #1b7a63;
            --teal-dark: #146351;
            --coral: #e74c3c;
            --gray-divider: #ececec;
            --gray-text: #6b7280;
            --he-purple: #6c5ce7;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 90%;
            max-width: 460px;
            padding: 30px 35px;
            text-align: center;
            position: relative;
        }

        /* ---------- Top bar ---------- */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .btn-icon {
            border: none;
            background: none;
            cursor: pointer;
            font-size: 18px;
            color: var(--coral);
            width: 32px;
        }

        .btn-icon.gear { color: #bbb; }
        .btn-icon.gear:hover { color: var(--teal); }

        .contador {
            font-weight: 600;
            color: #444;
            font-size: 15px;
        }

        /* ---------- Fixed-height phrase boxes ---------- */
        .frase-box {
            min-height: 92px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px 6px;
        }

        .frase-box.en-box {
            min-height: 92px;
        }

        .target-en {
            font-size: 26px;
            font-weight: 700;
            color: var(--teal-dark);
            line-height: 1.25;
        }

        .frase-box.he-box {
            min-height: 150px;
        }

        .lang-he {
            font-size: 26px;
            font-weight: bold;
            color: var(--he-purple);
            direction: rtl;
            line-height: 1.9; /* más aire entre líneas para que el nikud no se corte */
        }

        .frase-box.es-box {
            min-height: 40px;
        }

        .lang-es {
            font-size: 16px;
            color: #444;
            line-height: 1.2;
        }

        .word {
            cursor: pointer;
            border-radius: 4px;
            padding: 0 1px;
            transition: background 0.15s;
        }

        .word:hover {
            background: #f0eee4;
        }

        .lang-he-trans {
            font-size: 14px;
            color: #95a5a6;
            font-style: italic;
            display: none;
            margin-top: 2px;
        }

        /* ---------- Mini control row above each divider (rep counter, ya la domino, stars) ---------- */
        .progress-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: #888;
            padding: 0 2px 6px 2px;
        }

        .btn-dominada {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            text-decoration: underline;
            font-size: 13px;
        }

        .stars i { font-size: 13px; color: var(--coral); margin-left: 2px; }

        /* ---------- Hebrew utility row (nikud toggle + gear) ---------- */
        .he-utility-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 4px;
        }

        .nikud-toggle {
            border: none;
            background: none;
            cursor: pointer;
            color: var(--teal);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .nikud-toggle.activo { color: var(--teal-dark); font-weight: 700; }

        /* ---------- Static dividers ---------- */
        .divider {
            height: 2px;
            background: var(--gray-divider);
            margin: 14px 0;
            border-radius: 2px;
        }

        /* ---------- Bottom controls ---------- */
        .controls-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 26px;
            margin: 22px 0 6px;
        }

        .btn-nav {
            background: white;
            border: 2px solid var(--coral);
            color: var(--coral);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-nav:hover { background: #fdecea; }

        .btn-play {
            background: var(--teal);
            color: white;
            border: none;
            width: 62px;
            height: 62px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        .btn-play.playing { background: var(--coral); }

        /* ---------- Floating config popups ---------- */
        .config-popup {
            display: none;
            position: absolute;
            top: 46px;
            right: 10px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
            padding: 18px 22px;
            width: 230px;
            text-align: left;
            z-index: 50;
            border: 1px solid #eee;
        }

        .config-popup.he-popup { top: 38px; }

        .config-popup h4 {
            margin: 0 0 12px 0;
            font-size: 16px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .config-popup .btn-close-popup {
            border: none;
            background: none;
            color: #aaa;
            cursor: pointer;
            font-size: 16px;
        }

        .config-popup .btn-close-popup:hover { color: var(--coral); }

        .config-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13px;
            color: #555;
        }

        .config-row input[type="number"] {
            width: 60px;
            padding: 4px 6px;
            border: 1px solid #ddd;
            border-radius: 6px;
            text-align: center;
        }

        .config-toggle {
            border: 1px solid #ddd;
            background: #f7f7f7;
            color: #777;
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 12px;
        }

        .config-toggle.activo {
            background: var(--teal);
            border-color: var(--teal);
            color: white;
            font-weight: 700;
        }

        /* voice selector — hidden until male/female/child audio sets exist */
        .voice-selector-hidden {
            display: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        async function checkAuth() {
            const { data } = await window.supabase.auth.getSession();
            if (!data.session) {
                window.location.href = 'login.html';
            }
        }
        checkAuth();
    </script>
</head>

<body>
    <div class="card">

        <!-- ===== Top bar: salir / contador / config inglés ===== -->
        <div class="top-bar">
            <button class="btn-icon" onclick="cerrarSesion()" title="Cerrar sesión"><i class="fas fa-sign-out-alt"></i></button>
            <div class="contador" id="contador">Cargando...</div>
            <button class="btn-icon gear" onclick="abrirConfig('en')" title="Configuración Inglés"><i class="fas fa-cog"></i></button>
        </div>

        <!-- ===== Bloque Inglés ===== -->
        <div id="block-en" style="position: relative;">
            <div class="frase-box en-box">
                <div class="target-en" id="texto-en">...</div>
            </div>
            <div class="progress-row" id="progress-row-en">
                <span id="rep-counter-en">Repetición 0 de 5</span>
                <button class="btn-dominada" onclick="marcarDominada('en')">¡Ya la domino!</button>
                <span class="stars" id="stars-en"></span>
            </div>

            <div class="config-popup" id="config-en">
                <h4>Configuración <button class="btn-close-popup" onclick="cerrarConfig('en')">✕</button></h4>
                <div class="config-row">
                    <span>Repeticiones</span>
                    <input type="number" min="1" value="5" onchange="setConfig('en','reps',this.value)">
                </div>
                <div class="config-row">
                    <span>Duración intervalo</span>
                    <input type="number" min="0" step="0.1" value="1.3" onchange="setConfig('en','intervalo',this.value)">
                </div>
                <div class="config-row">
                    <span>Velocidad</span>
                    <input type="number" min="0.25" max="2" step="0.05" value="1" onchange="setConfig('en','velocidad',this.value)">
                </div>
                <!-- Oculto hasta tener audios de voz masculina/femenina/niño -->
                <div class="config-row voice-selector-hidden">
                    <span>Voz</span>
                    <select onchange="setConfig('en','voz',this.value)">
                        <option value="hombre">Hombre</option>
                        <option value="mujer">Mujer</option>
                        <option value="nino">Niño</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- ===== Bloque Hebreo ===== -->
        <div id="block-he" style="position: relative;">
            <div class="he-utility-row">
                <button class="nikud-toggle" id="btn-nikud" onclick="toggleNikud()" title="Mostrar/ocultar nikud">
                    <i class="fas fa-eye"></i> נקודים
                </button>
                <button class="btn-icon gear" onclick="abrirConfig('he')" title="Configuración Hebreo"><i class="fas fa-cog"></i></button>
            </div>

            <div class="frase-box he-box">
                <div class="lang-he" id="texto-he"></div>
            </div>
            <div class="lang-he-trans" id="texto-trans"></div>

            <div class="progress-row" id="progress-row-he">
                <span id="rep-counter-he">Repetición 0 de 5</span>
                <button class="btn-dominada" onclick="marcarDominada('he')">¡Ya la domino!</button>
                <span class="stars" id="stars-he"></span>
            </div>

            <div class="config-popup he-popup" id="config-he">
                <h4>Configuración <button class="btn-close-popup" onclick="cerrarConfig('he')">✕</button></h4>
                <div class="config-row">
                    <span>Repeticiones</span>
                    <input type="number" min="1" value="5" onchange="setConfig('he','reps',this.value)">
                </div>
                <div class="config-row">
                    <span>Duración intervalo</span>
                    <input type="number" min="0" step="0.1" value="1.3" onchange="setConfig('he','intervalo',this.value)">
                </div>
                <div class="config-row">
                    <span>Velocidad</span>
                    <input type="number" min="0.25" max="2" step="0.05" value="1" onchange="setConfig('he','velocidad',this.value)">
                </div>
                <div class="config-row">
                    <span>Nikudim</span>
                    <button class="config-toggle" id="toggle-nikud-config" onclick="toggleNikudGlobal()">Mostrar</button>
                </div>
                <div class="config-row">
                    <span>Transliteración</span>
                    <button class="config-toggle" id="toggle-translit" onclick="toggleTransliteracion()">Mostrar</button>
                </div>
                <!-- Oculto hasta tener audios de voz masculina/femenina/niño -->
                <div class="config-row voice-selector-hidden">
                    <span>Voz</span>
                    <select onchange="setConfig('he','voz',this.value)">
                        <option value="hombre">Hombre</option>
                        <option value="mujer">Mujer</option>
                        <option value="nino">Niño</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- ===== Bloque Español (solo se reproduce 1 vez al inicio de cada secuencia) ===== -->
        <div id="block-es" style="position: relative;">
            <div class="frase-box es-box">
                <div class="lang-es" id="texto-es"></div>
            </div>
        </div>

        <!-- ===== Controles ===== -->
        <div class="controls-row">
            <button class="btn-nav" onclick="cambiarFrase(-1)"><i class="fas fa-chevron-left"></i></button>
            <button class="btn-play" id="btn-play" onclick="toggleAudio()"><i class="fas fa-play" id="play-icon"></i></button>
            <button class="btn-nav" onclick="cambiarFrase(1)"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <script src="js/engine.js"></script>
    <script>
        /* =========================================================
           ESTADO GENERAL
        ========================================================= */
        let frasesActivas = [], indice = 0, isPlaying = false;

        // Config por idioma. velocidad se aplica directo al Audio (playbackRate),
        // independiente de lo que haga engine.js.
        const config = {
            en: { reps: 5, intervalo: 1.3, velocidad: 1 },
            he: { reps: 5, intervalo: 1.3, velocidad: 1, transliteracion: false },
            es: { reps: 1, intervalo: 1.3, velocidad: 1 }
        };

        // Progreso por idioma y por frase (clave = id de la frase, NO el índice,
        // así el progreso no se mezcla si cambia el orden del array).
        // Cada entrada: { reps, stars, dominada, lastStarDate }
        let progreso = { en: {}, he: {}, es: {} };

        // Por defecto se muestra el nikud: un alumno nuevo siempre empieza
        // viendo las frases con nikud, y lo va quitando a medida que avanza.
        let nikudVisible = true;

        const audios = {
            'en': new Audio('audios/en_milo_rvcr_P1_v1.mp3'),
            'es': new Audio('audios/sp_Bautista-rvcr_p1_v1.mp3'),
            'he': new Audio('audios/he_Atlas_rvcr_p1_v1.mp3')
        };

        /* =========================================================
           PERSISTENCIA DE PROGRESO (localStorage)
        ========================================================= */
        const STORAGE_KEY = 'hardyglot_progreso_v1';

        function cargarProgreso() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) progreso = JSON.parse(raw);
            } catch (e) {
                console.warn('No se pudo cargar el progreso guardado:', e);
            }
        }

        function guardarProgreso() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(progreso));
            } catch (e) {
                console.warn('No se pudo guardar el progreso:', e);
            }
        }

        function getTodayStr() {
            return new Date().toISOString().slice(0, 10); // "YYYY-MM-DD"
        }

        /* =========================================================
           CARGA DE FRASES
        ========================================================= */
        cargarProgreso();
        fetch('frases.json').then(r => r.json()).then(d => {
            frasesActivas = d;
            actualizarUI();
        });

        function getProgreso(lang) {
            const f = frasesActivas[indice];
            const id = f.id;
            if (!progreso[lang][id]) {
                progreso[lang][id] = { reps: 0, stars: 0, dominada: false, lastStarDate: null };
            }
            return progreso[lang][id];
        }

        /* =========================================================
           RENDER PRINCIPAL
        ========================================================= */
        function actualizarUI() {
            const f = frasesActivas[indice];
            if (!f) return;

            document.getElementById('texto-en').innerHTML = envolverPalabras(f.idioma_objetivo.frase_completa, 'en');
            document.getElementById('texto-es').innerHTML = envolverPalabras(f.idiomas_soporte[0].frase_traduccion, 'es');

            // Hebreo: usa nikud si el JSON lo trae (frase_traduccion_nikud), si no, cae al texto normal
            const heData = f.idiomas_soporte[1];
            const textoHebreo = nikudVisible
                ? (heData.frase_traduccion_nikud || heData.frase_traduccion)
                : (heData.frase_traduccion_sin_nikud || heData.frase_traduccion);
            document.getElementById('texto-he').innerHTML = envolverPalabras(textoHebreo, 'he');
            document.getElementById('texto-trans').innerText = heData.transliteracion;

            document.getElementById('contador').innerText = `Frase ${indice + 1} de ${frasesActivas.length}`;

            renderProgreso('en');
            renderProgreso('he');
            aplicarTransliteracionUI();
            aplicarNikudUI();
        }

        // Envuelve cada palabra en un span clicable para reproducir su pronunciación (TTS)
        function envolverPalabras(texto, lang) {
            if (!texto) return '';
            return texto.split(' ').map(palabra =>
                `<span class="word" onclick="reproducirPalabra('${palabra.replace(/'/g, "\\'")}','${lang}')">${palabra}</span>`
            ).join(' ');
        }

        function reproducirPalabra(palabra, lang) {
            const f = frasesActivas[indice];
            const limpio = palabra.replace(/[.,!?¿¡":]/g, '');

            // Si la frase trae timestamps por palabra (audios_por_palabra) para este
            // idioma, usamos el audio maestro real en vez de TTS.
            let mapa = null;
            if (lang === 'en') mapa = f.idioma_objetivo.audios_por_palabra;
            // es/he: aún no tienen audios_por_palabra en el JSON; cuando se agregue
            // con la misma forma { "palabra": [inicio, fin] }, esto ya lo va a usar.

            if (mapa && mapa[limpio]) {
                AudioEngine.playSegment(audios[lang], mapa[limpio]);
                return;
            }

            // Respaldo: voz sintética del navegador
            const codigos = { en: 'en-US', he: 'he-IL', es: 'es-CO' };
            const utterance = new SpeechSynthesisUtterance(limpio);
            utterance.lang = codigos[lang] || 'en-US';
            speechSynthesis.cancel();
            speechSynthesis.speak(utterance);
        }

        /* =========================================================
           PROGRESO / ESTRELLAS / "YA LA DOMINO"
        ========================================================= */
        function renderProgreso(lang) {
            // El español se reproduce una sola vez por secuencia y no tiene
            // fila de progreso en el HTML (sin contador ni estrellas), así
            // que aquí no hay nada que actualizar.
            if (lang === 'es') return;

            const p = getProgreso(lang);
            const row = document.getElementById('progress-row-' + lang);
            row.style.display = p.dominada ? 'none' : 'flex';

            document.getElementById('rep-counter-' + lang).innerText =
                `Repetición ${Math.min(p.reps, config[lang].reps)} de ${config[lang].reps}`;

            const starsEl = document.getElementById('stars-' + lang);
            let html = '';
            for (let i = 1; i <= 5; i++) {
                html += `<i class="${i <= p.stars ? 'fas' : 'far'} fa-star"></i>`;
            }
            starsEl.innerHTML = html;
        }

        function marcarDominada(lang) {
            getProgreso(lang).dominada = true;
            guardarProgreso();
            renderProgreso(lang);
        }

        // Se llama cuando se completa un set entero de repeticiones para ese idioma.
        // Solo se gana 1 estrella por día calendario por frase+idioma, sin importar
        // cuántas veces se complete el set ese mismo día.
        function incrementarEstrella(lang, esSetCompletado = false) {
            const p = getProgreso(lang);
            if (esSetCompletado) {
                p.reps = config[lang].reps;
                const hoy = getTodayStr();
                if (p.lastStarDate !== hoy) {
                    if (p.stars < 5) p.stars++;
                    p.lastStarDate = hoy;
                }
                guardarProgreso();
                renderProgreso(lang);
            } else {
                p.reps = Math.min(p.reps + 1, config[lang].reps);
                renderProgreso(lang);
            }
        }

        /* =========================================================
           NAVEGACIÓN
        ========================================================= */
        function cambiarFrase(d) {
            indice = (indice + d + frasesActivas.length) % frasesActivas.length;
            actualizarUI();
        }

        /* =========================================================
           NIKUD / TRANSLITERACIÓN
        ========================================================= */
        function toggleNikud() {
            nikudVisible = !nikudVisible;
            actualizarUI(); // vuelve a pintar el texto hebreo con/sin nikud, y llama aplicarNikudUI()
        }

        function aplicarNikudUI() {
            document.getElementById('btn-nikud').classList.toggle('activo', nikudVisible);

            const btnConfig = document.getElementById('toggle-nikud-config');
            btnConfig.classList.toggle('activo', nikudVisible);
            btnConfig.innerText = nikudVisible ? 'Ocultar' : 'Mostrar';
        }

        function toggleTransliteracion() {
            config.he.transliteracion = !config.he.transliteracion;
            aplicarTransliteracionUI();
        }

        function aplicarTransliteracionUI() {
            document.getElementById('texto-trans').style.display = config.he.transliteracion ? 'block' : 'none';
            const btn = document.getElementById('toggle-translit');
            btn.classList.toggle('activo', config.he.transliteracion);
            btn.innerText = config.he.transliteracion ? 'Ocultar' : 'Mostrar';
        }

        /* =========================================================
           VENTANAS FLOTANTES DE CONFIGURACIÓN (una por idioma)
        ========================================================= */
        function abrirConfig(lang) {
            // cierra cualquier otra abierta
            document.querySelectorAll('.config-popup').forEach(p => p.style.display = 'none');
            document.getElementById('config-' + lang).style.display = 'block';
        }

        function cerrarConfig(lang) {
            document.getElementById('config-' + lang).style.display = 'none';
        }

        // Cierra cualquier popup si se hace click fuera de él y fuera del botón de engranaje
        document.addEventListener('click', function (e) {
            document.querySelectorAll('.config-popup').forEach(popup => {
                if (popup.style.display === 'block' &&
                    !popup.contains(e.target) &&
                    !e.target.closest('.gear')) {
                    popup.style.display = 'none';
                }
            });
        });

        function setConfig(lang, campo, valor) {
            config[lang][campo] = parseFloat(valor);

            if (campo === 'reps') {
                AudioEngine.sessionConfig.reps[lang] = parseInt(valor);
            }
            if (campo === 'intervalo') {
                AudioEngine.sessionConfig.silenceGap[lang] = parseFloat(valor);
            }
            if (campo === 'velocidad' && audios[lang]) {
                audios[lang].playbackRate = parseFloat(valor);
            }
            renderProgreso(lang);
        }

        /* =========================================================
           AUDIO / SECUENCIA DE REPRODUCCIÓN
           Orden esperado: ES (1 vez) -> EN (x reps) -> ES (1 vez) -> HE (x reps)
        ========================================================= */
        async function toggleAudio(forzarInicio = false) {
            if (!forzarInicio) {
                isPlaying = !isPlaying;
            }
            const btn = document.getElementById('btn-play');
            const icon = document.getElementById('play-icon');

            if (isPlaying) {
                btn.classList.add('playing');
                icon.className = 'fas fa-pause';
                AudioEngine.playSequence(frasesActivas[indice], audios, (lang, esFin) => {
                    incrementarEstrella(lang, esFin);
                });
            } else {
                btn.classList.remove('playing');
                icon.className = 'fas fa-play';
                AudioEngine.isPlaying = false;
                Object.values(audios).forEach(a => { a.pause(); a.currentTime = 0; });
            }
        }

        window.addEventListener('fraseCompletada', () => {
            if (isPlaying) {
                AudioEngine.stepIndex = 0;
                AudioEngine.repIndex = 0;
                cambiarFrase(1);
                setTimeout(() => toggleAudio(true), 1000);
            }
        });

        async function cerrarSesion() {
            const { error } = await window.supabase.auth.signOut();
            if (!error) {
                window.location.href = 'login.html';
            } else {
                alert("Error al cerrar sesión: " + error.message);
            }
        }
    </script>
</body>

</html>
