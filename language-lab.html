<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Language Lab - Sistema de Estrellas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 90%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
            position: relative;
        }

        .divider {
            height: 2px;
            background: #f0f0f0;
            margin: 30px 0;
            border-radius: 2px;
        }

        .btn-config {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 18px;
            color: #ccc;
        }

        .stars {
            margin: 10px 0;
            color: #ddd;
        }

        .controls-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
        }

        .btn-nav {
            background: #f8f9fa;
            border: 1px solid #eee;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }

        .btn-play {
            background: #27ae60;
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        .btn-play.playing {
            background: #e67e22;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin: 8% auto;
            width: 80%;
            max-width: 350px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .btn-close-modal {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            font-size: 20px;
            color: #999;
            cursor: pointer;
            line-height: 1;
        }

        .btn-close-modal:hover {
            color: #e74c3c;
        }

        .lang-he-trans {
            font-size: 15px;
            color: #95a5a6;
            font-style: italic;
            display: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        async function checkAuth() {
            const { data } = await window.supabase.auth.getSession();
            if (!data.session) {
                window.location.href = 'login.html';
            }
        }
        checkAuth();
    </script>
</head>

<body>
    <div class="card">
        <button class="btn-config" onclick="document.getElementById('modal').style.display='flex'" title="Configuración"><i class="fas fa-cog"></i></button>
        <button onclick="cerrarSesion()"
            style="position: absolute; top: 20px; left: 20px; cursor: pointer; border: none; background: none; font-size: 18px; color: #e74c3c;"
            title="Cerrar sesión">
            <i class="fas fa-sign-out-alt"></i>
        </button>
        <div class="contador" id="contador">Cargando...</div>

        <div id="block-en">
            <div class="target-en" id="texto-en" style="font-size: 28px; font-weight: 700;">...</div>
            <div class="stars" id="stars-en">☆☆☆☆☆☆☆</div>
        </div>

        <div class="divider"></div>

        <div id="block-he">
            <div class="lang-he" id="texto-he"
                style="font-size: 26px; font-weight: bold; color: #6c5ce7; direction: rtl;"></div>
            <div class="lang-he-trans" id="texto-trans" style="font-size: 15px; color: #95a5a6; font-style: italic;">
            </div>
            <div class="stars" id="stars-he">☆☆☆☆☆☆☆</div>
        </div>

        <div class="divider"></div>

        <div id="block-es">
            <div class="lang-es" id="texto-es" style="font-size: 19px; color: #444;"></div>
            <div class="stars" id="stars-es">☆☆☆☆☆☆☆</div>
        </div>

        <div class="controls-row">
            <button class="btn-nav" onclick="cambiarFrase(-1)"><i class="fas fa-chevron-left"></i></button>
            <button class="btn-play" id="btn-play" onclick="toggleAudio()"><i class="fas fa-play"
                    id="play-icon"></i></button>
            <button class="btn-nav" onclick="cambiarFrase(1)"><i class="fas fa-chevron-right"></i></button>
        </div>
        <button onclick="marcarDominada()"
            style="background:none; border:none; color:#999; cursor:pointer; text-decoration:underline;">¡Ya la
            domino!</button>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="btn-close-modal" onclick="cerrarModal()" title="Cerrar">✕</button>
            <h3>Configuración General</h3>
            <p><strong>Audios a reproducir:</strong></p>
            <button onclick="toggleLang('en', this)">Inglés</button>
            <button onclick="toggleLang('es', this)">Español</button>
            <button onclick="toggleLang('he', this)">Hebreo</button>

            <p><strong>Visibilidad Textos:</strong></p>
            <button onclick="toggleElement('block-en')">Inglés</button>
            <button onclick="toggleElement('block-es')">Español</button>
            <button onclick="toggleElement('block-he')">Hebreo</button>
            <button onclick="toggleElement('texto-trans')">Transliteración</button>

            <p><strong>Repeticiones:</strong></p>
            Inglés: <input type="number" value="5" min="1"
                onchange="AudioEngine.sessionConfig.reps.en = parseInt(this.value)"><br>
            Hebreo: <input type="number" value="5" min="1"
                onchange="AudioEngine.sessionConfig.reps.he = parseInt(this.value)"><br>
            Español: <input type="number" value="1" min="1"
                onchange="AudioEngine.sessionConfig.reps.es = parseInt(this.value)">

            <p><strong>Silencios (segundos):</strong></p>
            Inglés: <input type="number" id="gap-en" step="0.1" min="0"
                onchange="AudioEngine.sessionConfig.silenceGap.en = parseFloat(this.value)"><br>
            Hebreo: <input type="number" id="gap-he" step="0.1" min="0"
                onchange="AudioEngine.sessionConfig.silenceGap.he = parseFloat(this.value)"><br>
            Español: <input type="number" id="gap-es" step="0.1" min="0"
                onchange="AudioEngine.sessionConfig.silenceGap.es = parseFloat(this.value)">

            <br><br>
            <div style="text-align:center;">
                <button onclick="cerrarModal()">Cerrar</button>
            </div>
        </div>
    </div>
    <script src="js/engine.js"></script>
    <script>
        let frasesActivas = [], indice = 0, isPlaying = false, configs = { reps: 5 };
        let progreso = { en: 0, es: 0, he: 0 };
        const audios = { 'en': new Audio('audios/en_milo_rvcr_P1_v1.mp3'), 'es': new Audio('audios/sp_Bautista-rvcr_p1_v1.mp3'), 'he': new Audio('audios/he_Atlas_rvcr_p1_v1.mp3') };

        fetch('test-frases.json').then(r => r.json()).then(d => { frasesActivas = d; actualizarUI(); });

        function actualizarUI() {
            const f = frasesActivas[indice];
            document.getElementById('texto-en').innerText = f.idioma_objetivo.frase_completa;
            document.getElementById('texto-es').innerText = f.idiomas_soporte[0].frase_traduccion;
            document.getElementById('texto-he').innerText = f.idiomas_soporte[1].frase_traduccion;
            document.getElementById('texto-trans').innerText = f.idiomas_soporte[1].transliteracion;
            document.getElementById('contador').innerText = `Frase ${indice + 1} de ${frasesActivas.length}`;
        }
        fetch('test-frases.json').then(r => r.json()).then(d => {
            frasesActivas = d;
            actualizarUI();

            // --- ESTA LÍNEA FUERZA EL ESTADO INICIAL ---
            document.getElementById('texto-trans').style.display = 'none';
        });

        function toggleElement(id) {
            const el = document.getElementById(id);
            // Si no tiene un display definido o está en 'none', lo mostramos, si no, lo ocultamos
            if (el.style.display === 'none') {
                el.style.display = 'block';
            } else {
                el.style.display = 'none';
            }
        }

        function marcarDominada() { frasesActivas.splice(indice, 1); indice = 0; actualizarUI(); }
        function cambiarFrase(d) { indice = (indice + d + frasesActivas.length) % frasesActivas.length; actualizarUI(); }
        async function toggleAudio(forzarInicio = false) {
            // Si forzamos inicio (auto-play), no cambiamos el estado isPlaying global
            if (!forzarInicio) {
                isPlaying = !isPlaying;
                document.getElementById('btn-play').innerText = isPlaying ? "| |" : "▶";
            }
            const btn = document.getElementById('btn-play');

            if (isPlaying) {
                btn.classList.add('playing');
                AudioEngine.playSequence(frasesActivas[indice], audios, (lang, esFin) => {
                    incrementarEstrella(lang, esFin);
                });
            } else {
                btn.classList.remove('playing');
                btn.innerText = "▶";
                AudioEngine.isPlaying = false;
                Object.values(audios).forEach(a => { a.pause(); a.currentTime = 0; });
            }
        }
        function incrementarEstrella(lang, esSetCompletado = false) {
            if (esSetCompletado) {
                progreso[lang] = (progreso[lang] + 1) % 8;
                let container = document.getElementById('stars-' + lang);
                if (container) {
                    container.innerHTML = '★'.repeat(progreso[lang]) + '☆'.repeat(7 - progreso[lang]);
                }
            } else {
                console.log(`Reproducción individual en ${lang}`);
            }
        }

        window.addEventListener('fraseCompletada', () => {
            if (isPlaying) {
                AudioEngine.stepIndex = 0;
                AudioEngine.repIndex = 0;
                cambiarFrase(1);
                setTimeout(() => toggleAudio(true), 1000);
            }
        });
        // Sincronizar valores de silencio desde el motor a la ventana
        document.getElementById('gap-en').value = AudioEngine.sessionConfig.silenceGap.en;
        document.getElementById('gap-he').value = AudioEngine.sessionConfig.silenceGap.he;
        document.getElementById('gap-es').value = AudioEngine.sessionConfig.silenceGap.es;

        function cerrarModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Cierra el modal si se hace click fuera del cuadro de configuración
        document.getElementById('modal').addEventListener('click', function (e) {
            if (e.target === this) {
                cerrarModal();
            }
        });

        async function cerrarSesion() {
            const { error } = await window.supabase.auth.signOut();
            if (!error) {
                window.location.href = 'login.html';
            } else {
                alert("Error al cerrar sesión: " + error.message);
            }
        }
    </script>
</body>

</html>
